<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTCAE Explorer — v5 vs v6 | Trialing Health</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a1a;font-size:14px}

/* Header */
.app-header{background:#1B4F8A;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.app-header h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.app-header .sub{font-size:12px;opacity:0.7;margin-top:2px}
.stats-row{display:flex;gap:8px}
.stat-pill{background:rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;white-space:nowrap}
.stat-pill.new{background:rgba(29,158,117,0.4)}
.stat-pill.removed{background:rgba(216,90,48,0.4)}
.stat-pill.changed{background:rgba(239,159,39,0.35)}

/* Layout */
.app-body{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 60px)}

/* Sidebar */
.sidebar{background:#fff;border-right:1px solid #e5e7eb;padding:16px;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:60px}
.sidebar-section{margin-bottom:18px}
.sidebar-label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}

input[type=search]{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;background:#f9fafb;color:#1a1a1a}
input[type=search]:focus{border-color:#1B4F8A;background:#fff}

.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-btn{padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;background:transparent;font-size:12px;cursor:pointer;text-align:left;color:#374151;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:all 0.1s}
.filter-btn:hover{background:#f3f4f6}
.filter-btn.active{background:#EFF6FF;border-color:#1B4F8A;color:#1B4F8A;font-weight:500}
.filter-btn .count{font-size:11px;color:#9ca3af;font-weight:400}
.filter-btn.active .count{color:#6B93C4}

.soc-list{display:flex;flex-direction:column;gap:2px;max-height:320px;overflow-y:auto}
.soc-btn{padding:5px 8px;border:none;border-radius:5px;background:transparent;font-size:11px;cursor:pointer;text-align:left;color:#374151;display:flex;justify-content:space-between;gap:4px;line-height:1.3}
.soc-btn:hover{background:#f3f4f6;color:#1a1a1a}
.soc-btn.active{background:#EFF6FF;color:#1B4F8A;font-weight:500}
.soc-btn .soc-count{font-size:10px;color:#9ca3af;white-space:nowrap;flex-shrink:0}

/* Main */
.main{padding:20px;overflow-y:auto}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-count{font-size:13px;color:#6b7280}
.clear-btn{font-size:12px;color:#1B4F8A;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px}
.clear-btn:hover{background:#EFF6FF}

/* Cards */
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;transition:border-color 0.1s}
.card:hover{border-color:#1B4F8A}
.card-header{padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;user-select:none}
.card-left{flex:1;min-width:0}
.card-term{font-size:14px;font-weight:500;color:#111827;margin-bottom:3px}
.card-soc{font-size:11px;color:#9ca3af}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.badge-new{background:#D1FAE5;color:#065F46}
.badge-removed{background:#FEE2E2;color:#991B1B}
.badge-clinical{background:#FEF3C7;color:#92400E}
.badge-pediatric{background:#EDE9FE;color:#4C1D95}
.badge-unchanged{background:#F3F4F6;color:#6B7280}
.card-toggle{color:#9ca3af;font-size:18px;line-height:1;flex-shrink:0;padding-top:2px;transition:transform 0.2s}
.card.open .card-toggle{transform:rotate(180deg)}

/* Grade grid */
.card-body{display:none;padding:0 16px 16px}
.card.open .card-body{display:block}
.grade-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:4px}
.grade-col{border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
.grade-col.changed{border-color:#F59E0B}
.grade-col.new-grade{border-color:#10B981}
.grade-col.removed-grade{border-color:#EF4444}
.grade-label{padding:5px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;text-align:center}
.grade-label.g1{background:#ECFDF5;color:#065F46}
.grade-label.g2{background:#FFFBEB;color:#92400E}
.grade-label.g3{background:#FEF3C7;color:#92400E}
.grade-label.g4{background:#FEE2E2;color:#991B1B}
.grade-label.g5{background:#1a1a1a;color:#fff}
.grade-versions{display:flex;flex-direction:column;gap:0}
.grade-ver{padding:6px 8px;font-size:11px;line-height:1.4;color:#374151;border-bottom:1px solid #f3f4f6}
.grade-ver:last-child{border-bottom:none}
.grade-ver .ver-tag{font-size:9px;font-weight:600;display:block;margin-bottom:2px;opacity:0.7}
.grade-ver.v5-row .ver-tag{color:#6B7280}
.grade-ver.v6-row .ver-tag{color:#1B4F8A}
.grade-ver.changed-row{background:#FFFBEB}
.grade-ver.added-row{background:#ECFDF5}
.grade-ver.removed-row{background:#FEF2F2}
.grade-ver .empty{color:#d1d5db;font-style:italic}

.definition-block{margin-top:10px;padding:10px 12px;background:#f9fafb;border-radius:6px;border:1px solid #f3f4f6}
.definition-block .def-label{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.definition-block p{font-size:11px;line-height:1.5;color:#374151}

.no-results{text-align:center;padding:48px 24px;color:#9ca3af}
.no-results .big{font-size:32px;margin-bottom:8px}
.no-results p{font-size:13px}

/* Grade indicator dots on card header */
.grade-dots{display:flex;gap:3px;margin-top:6px}
.gdot{width:8px;height:8px;border-radius:50%;background:#e5e7eb}
.gdot.has-change{background:#F59E0B}
.gdot.has-v6{background:#10B981}
.gdot.has-v5{background:#EF4444}

/* Loading */
.loading{text-align:center;padding:60px;color:#9ca3af;font-size:13px}

@media(max-width:700px){
  .app-body{grid-template-columns:1fr}
  .sidebar{max-height:none;position:static;border-right:none;border-bottom:1px solid #e5e7eb}
  .grade-grid{grid-template-columns:1fr 1fr}
  .stats-row{display:none}
}
</style>
</head>
<body>

<div class="app-header">
  <div>
    <h1>CTCAE Explorer — v5 vs v6</h1>
    <div class="sub">Trialing Health · Uso interno del equipo médico</div>
  </div>
  <div class="stats-row">
    <span class="stat-pill">897 términos</span>
    <span class="stat-pill changed">376 modificados</span>
    <span class="stat-pill new">60 nuevos</span>
    <span class="stat-pill removed">47 eliminados</span>
  </div>
</div>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Buscar</div>
      <input type="search" id="search" placeholder="Término, síntoma..." autocomplete="off">
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Filtrar por cambio</div>
      <div class="filter-group">
        <button class="filter-btn active" data-status="all" onclick="setStatus('all',this)">
          Todos los términos <span class="count" id="cnt-all">897</span>
        </button>
        <button class="filter-btn" data-status="changed" onclick="setStatus('changed',this)">
          Modificados (v5→v6) <span class="count" id="cnt-changed">376</span>
        </button>
        <button class="filter-btn" data-status="clinical" onclick="setStatus('clinical',this)">
          Cambio clínico real <span class="count" id="cnt-clinical">141</span>
        </button>
        <button class="filter-btn" data-status="pediatric" onclick="setStatus('pediatric',this)">
          Solo pediátrico <span class="count" id="cnt-pediatric">235</span>
        </button>
        <button class="filter-btn" data-status="new" onclick="setStatus('new',this)">
          Nuevos en v6 <span class="count" id="cnt-new">60</span>
        </button>
        <button class="filter-btn" data-status="removed" onclick="setStatus('removed',this)">
          Eliminados en v6 <span class="count" id="cnt-removed">47</span>
        </button>
        <button class="filter-btn" data-status="unchanged" onclick="setStatus('unchanged',this)">
          Sin cambios <span class="count" id="cnt-unchanged">414</span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Sistema orgánico (SOC)</div>
      <div class="soc-list" id="soc-list"></div>
    </div>
  </div>

  <div class="main">
    <div class="results-header">
      <span class="results-count" id="results-count">Cargando...</span>
      <button class="clear-btn" onclick="clearFilters()">Limpiar filtros</button>
    </div>
    <div class="cards" id="cards"><div class="loading">Cargando datos...</div></div>
  </div>
</div>

<script>
const DATA_URL = 'ctcae_data.json';
let ALL = [];
let activeSoc = 'all';
let activeStatus = 'all';
let searchQ = '';

const SOC_SHORT = {
  'Blood and lymphatic system disorders': 'Blood & lymphatic',
  'Cardiac disorders': 'Cardiac',
  'Congenital, familial and genetic disorders': 'Congenital',
  'Ear and labyrinth disorders': 'Ear & labyrinth',
  'Endocrine disorders': 'Endocrine',
  'Eye disorders': 'Eye',
  'Gastrointestinal disorders': 'Gastrointestinal',
  'General disorders and administration site conditions': 'General disorders',
  'Hepatobiliary disorders': 'Hepatobiliary',
  'Immune system disorders': 'Immune system',
  'Infections and infestations': 'Infections',
  'Injury, poisoning and procedural complications': 'Injury & procedural',
  'Investigations': 'Investigations (lab)',
  'Metabolism and nutrition disorders': 'Metabolism',
  'Musculoskeletal and connective tissue disorders': 'Musculoskeletal',
  'Neoplasms benign, malignant and unspecified (incl cysts and polyps)': 'Neoplasms',
  'Nervous system disorders': 'Nervous system',
  'Pregnancy, puerperium and perinatal conditions': 'Pregnancy',
  'Psychiatric disorders': 'Psychiatric',
  'Renal and urinary disorders': 'Renal & urinary',
  'Reproductive system and breast disorders': 'Reproductive',
  'Respiratory, thoracic and mediastinal disorders': 'Respiratory',
  'Skin and subcutaneous tissue disorders': 'Skin',
  'Social circumstances': 'Social',
  'Surgical and medical procedures': 'Surgical procedures',
  'Vascular disorders': 'Vascular',
};

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function badgeHtml(r){
  if(r.status==='new') return '<span class="badge badge-new">Nuevo en v6</span>';
  if(r.status==='removed') return '<span class="badge badge-removed">Eliminado en v6</span>';
  if(r.change_type==='clinical') return '<span class="badge badge-clinical">Cambio clínico</span>';
  if(r.change_type==='pediatric') return '<span class="badge badge-pediatric">Solo pediátrico</span>';
  return '<span class="badge badge-unchanged">Sin cambios</span>';
}

function gradeColClass(g, r){
  const gd = r.grades[g];
  if(!gd.v5 && gd.v6) return 'grade-col new-grade';
  if(gd.v5 && !gd.v6) return 'grade-col removed-grade';
  if(gd.changed) return 'grade-col changed';
  return 'grade-col';
}

function gradeVerClass(g, r, ver){
  const gd = r.grades[g];
  const base = ver==='v5' ? 'grade-ver v5-row' : 'grade-ver v6-row';
  if(!gd.v5 && gd.v6 && ver==='v6') return base+' added-row';
  if(gd.v5 && !gd.v6 && ver==='v5') return base+' removed-row';
  if(gd.changed) return base+' changed-row';
  return base;
}

function gradeText(val, fallback){
  if(!val) return `<span class="empty">${fallback}</span>`;
  return esc(val);
}

function renderCard(r, idx){
  const grades = ['g1','g2','g3','g4','g5'];
  const gradeLabels = {g1:'G1',g2:'G2',g3:'G3',g4:'G4',g5:'G5'};
  const gradeLabelClass = {g1:'g1',g2:'g2',g3:'g3',g4:'g4',g5:'g5'};

  const hasAnyGrade = grades.some(g => r.grades[g].v5 || r.grades[g].v6);

  let gradeHtml = '';
  if(hasAnyGrade){
    gradeHtml = '<div class="grade-grid">';
    for(const g of grades){
      const gd = r.grades[g];
      if(!gd.v5 && !gd.v6) continue;
      const showBoth = r.status !== 'new' && r.status !== 'removed';
      gradeHtml += `<div class="${gradeColClass(g,r)}">
        <div class="grade-label ${gradeLabelClass[g]}">${gradeLabels[g]}</div>
        <div class="grade-versions">`;
      if(r.status==='new'){
        gradeHtml += `<div class="grade-ver v6-row added-row"><span class="ver-tag">v6.0</span>${gradeText(gd.v6,'—')}</div>`;
      } else if(r.status==='removed'){
        gradeHtml += `<div class="grade-ver v5-row removed-row"><span class="ver-tag">v5.0</span>${gradeText(gd.v5,'—')}</div>`;
      } else {
        gradeHtml += `<div class="${gradeVerClass(g,r,'v5')}"><span class="ver-tag">v5.0</span>${gradeText(gd.v5,'no definido')}</div>`;
        gradeHtml += `<div class="${gradeVerClass(g,r,'v6')}"><span class="ver-tag">v6.0</span>${gradeText(gd.v6,'no definido')}</div>`;
      }
      gradeHtml += `</div></div>`;
    }
    gradeHtml += '</div>';
  }

  let defHtml = '';
  if(r.definition_v6 || r.definition_v5){
    const def = r.definition_v6 || r.definition_v5;
    defHtml = `<div class="definition-block"><div class="def-label">Definición</div><p>${esc(def)}</p></div>`;
  }

  const soc = SOC_SHORT[r.soc] || r.soc;
  const id = 'card-'+idx;

  return `<div class="card" id="${id}">
    <div class="card-header" onclick="toggleCard('${id}')">
      <div class="card-left">
        <div class="card-term">${esc(r.term)}</div>
        <div class="card-soc">${esc(soc)}</div>
        <div class="card-badges">${badgeHtml(r)}</div>
      </div>
      <div class="card-toggle">&#8964;</div>
    </div>
    <div class="card-body">
      ${gradeHtml}
      ${defHtml}
    </div>
  </div>`;
}

function toggleCard(id){
  document.getElementById(id).classList.toggle('open');
}

function filtered(){
  return ALL.filter(r => {
    if(activeStatus==='changed' && r.status!=='changed') return false;
    if(activeStatus==='clinical' && r.change_type!=='clinical') return false;
    if(activeStatus==='pediatric' && r.change_type!=='pediatric') return false;
    if(activeStatus==='new' && r.status!=='new') return false;
    if(activeStatus==='removed' && r.status!=='removed') return false;
    if(activeStatus==='unchanged' && r.status!=='unchanged') return false;
    if(activeSoc!=='all' && r.soc!==activeSoc) return false;
    if(searchQ){
      const q = searchQ.toLowerCase();
      if(!r.term.toLowerCase().includes(q) && !r.soc.toLowerCase().includes(q)){
        const gradeText = Object.values(r.grades).map(g=>(g.v5+g.v6).toLowerCase()).join(' ');
        if(!gradeText.includes(q)) return false;
      }
    }
    return true;
  });
}

const CHUNK = 40;
let rendered = 0;
let currentFiltered = [];

function render(){
  currentFiltered = filtered();
  rendered = 0;
  const container = document.getElementById('cards');
  const count = currentFiltered.length;
  document.getElementById('results-count').textContent = `${count} término${count!==1?'s':''} encontrado${count!==1?'s':''}`;

  if(!count){
    container.innerHTML = `<div class="no-results"><div class="big">—</div><p>No hay resultados para esta búsqueda.</p></div>`;
    return;
  }

  const first = currentFiltered.slice(0, CHUNK);
  container.innerHTML = first.map((r,i) => renderCard(r,i)).join('');
  rendered = first.length;

  if(rendered < count){
    const more = document.createElement('div');
    more.id = 'load-more';
    more.style.cssText = 'text-align:center;padding:20px';
    more.innerHTML = `<button onclick="loadMore()" style="padding:8px 20px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#374151">Cargar más (${count - rendered} restantes)</button>`;
    container.appendChild(more);
  }
}

function loadMore(){
  const container = document.getElementById('cards');
  const next = currentFiltered.slice(rendered, rendered + CHUNK);
  const moreBt = document.getElementById('load-more');
  const html = next.map((r,i) => renderCard(r, rendered+i)).join('');
  if(moreBt) moreBt.insertAdjacentHTML('beforebegin', html);
  rendered += next.length;
  if(rendered >= currentFiltered.length && moreBt) moreBt.remove();
  else if(moreBt){
    moreBt.innerHTML = `<button onclick="loadMore()" style="padding:8px 20px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#374151">Cargar más (${currentFiltered.length - rendered} restantes)</button>`;
  }
}

function setStatus(s, btn){
  activeStatus = s;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSoc(s, btn){
  activeSoc = s;
  document.querySelectorAll('.soc-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}

function clearFilters(){
  searchQ = '';
  activeStatus = 'all';
  activeSoc = 'all';
  document.getElementById('search').value = '';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-status="all"]').classList.add('active');
  document.querySelectorAll('.soc-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.soc-btn[data-soc="all"]').classList.add('active');
  render();
}

function buildSocList(){
  const socCounts = {};
  ALL.forEach(r => { socCounts[r.soc] = (socCounts[r.soc]||0)+1; });
  const socs = Object.entries(socCounts).sort((a,b)=>a[0].localeCompare(b[0]));
  const list = document.getElementById('soc-list');
  let html = `<button class="soc-btn active" data-soc="all" onclick="setSoc('all',this)"><span>Todos</span><span class="soc-count">${ALL.length}</span></button>`;
  for(const [soc, cnt] of socs){
    const short = SOC_SHORT[soc] || soc;
    html += `<button class="soc-btn" data-soc="${esc(soc)}" onclick="setSoc('${esc(soc)}',this)"><span>${esc(short)}</span><span class="soc-count">${cnt}</span></button>`;
  }
  list.innerHTML = html;
}

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{ searchQ = e.target.value.trim(); render(); }, 250);
});

fetch(DATA_URL)
  .then(r=>r.json())
  .then(data=>{
    ALL = data;
    buildSocList();
    render();
  })
  .catch(()=>{
    document.getElementById('cards').innerHTML = '<div class="no-results"><p>Error cargando datos. Asegúrate de abrir este archivo con un servidor local o en la misma carpeta que ctcae_data.json.</p></div>';
  });
</script>
</body>
</html>
